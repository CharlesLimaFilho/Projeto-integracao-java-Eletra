default:
  image: maven:3.8.6-jdk-8

stages:
  - pre-build
  - build

download-javafx:
  stage: pre-build
  script:
    - apt-get update -y
    - apt-get install -y openjfx
  artifacts:
    paths:
      - builds/

build-front:
  stage: build
  script:
    - cd project-integration
    - 'mvn clean package'
